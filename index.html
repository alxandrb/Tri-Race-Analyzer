<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPX TELEMETRY · ANALYZER</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Share+Tech+Mono&display=swap">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="styles.css">

  <!-- Libs are classic scripts: load + execute before the parser reaches main.js,
       which is a module (and thus deferred). Guarantees window.L and window.Chart
       are defined by the time main.js runs. -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script type="module" src="src/main.js"></script>
</head>
<body>
  <header>
    <h1>GPX Telemetry <span id="trackName"></span></h1>
    <div class="params">
      <label>FTP <input type="number" class="num-input" id="ftpInput" min="50" max="600" step="1"></label>
      <label>Poids <input type="number" class="num-input" id="weightInput" min="30" max="200" step="0.1" placeholder="kg"></label>
    </div>
    <div class="file-controls">
      <label for="fileInput">Charger un .gpx</label>
      <input type="file" id="fileInput" accept=".gpx,application/gpx+xml">
    </div>
  </header>

  <main id="main">
    <div class="loading" id="loading">[ INITIALISATION · LECTURE GPX ]</div>
  </main>
</body>
</html>
